<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nebula Launcher | New Account</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        .nebula-glow {
            background: linear-gradient(-45deg, #1e1b4b, #2e1065, #4c1d95, #6d28d9, #db2777);
            background-size: 400% 400%;
            animation: nebulaPulse 15s ease-in-out infinite;
        }
        @keyframes nebulaPulse {
            0%, 100% { background-position: 0% 50%; opacity: 0.8; }
            50% { background-position: 100% 50%; opacity: 1; }
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
    </style>
</head>
<body class="bg-[#0a0a0a] text-white min-h-screen flex items-center justify-center font-sans overflow-hidden">
    <div class="fixed inset-0 nebula-glow opacity-30 z-[-10]"></div>

    <div class="w-full max-w-md p-8 relative">
        <div class="text-center mb-10 space-y-4">
            <img src="../assets/logo.png" alt="Nebula" class="w-20 h-20 mx-auto animate-float drop-shadow-[0_0_20px_rgba(139,92,246,0.8)]">
            <h1 class="text-4xl font-black italic uppercase tracking-tighter">Initialize <span class="text-transparent bg-clip-text bg-gradient-to-r from-white via-nebula-400 to-nebula-500">Identity</span></h1>
            <p class="text-white/40 text-sm italic uppercase font-bold tracking-widest">Create Your Nebula Account</p>
        </div>

        <div class="glass-card p-8 rounded-[2rem] space-y-6 shadow-2xl shadow-nebula-500/10">
            <button onclick="handleLogin('discord')" class="w-full py-4 bg-[#5865F2] hover:bg-[#4752C4] text-white rounded-xl font-black uppercase italic tracking-widest text-xs transition-all flex items-center justify-center gap-3 shadow-lg shadow-[#5865F2]/20 active:scale-95">
                <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24"><path d="M20.317 4.37a19.791 19.791 0 0 0-4.885-1.515.074.074 0 0 0-.079.037c-.21.375-.444.864-.608 1.25a18.27 18.27 0 0 0-5.487 0 12.64 12.64 0 0 0-.617-1.25.077.077 0 0 0-.079-.037A19.736 19.736 0 0 0 3.677 4.37a.07.07 0 0 0-.032.027C.533 9.046-.32 13.58.099 18.057a.082.082 0 0 0 .031.057 19.9 19.9 0 0 0 5.993 3.03.078.078 0 0 0 .084-.028 14.09 14.09 0 0 0 1.226-1.994.076.076 0 0 0-.041-.106 13.107 13.107 0 0 1-1.872-.892.077.077 0 0 1-.008-.128 10.2 10.2 0 0 0 .372-.292.074.074 0 0 1 .077-.01c3.928 1.793 8.18 1.793 12.062 0a.074.074 0 0 1 .078.01c.12.098.246.198.373.292a.077.077 0 0 1-.006.127 12.299 12.299 0 0 1-1.873.892.077.077 0 0 0-.041.107c.36.698.772 1.362 1.225 1.993a.076.076 0 0 0 .084.028 19.839 19.839 0 0 0 6.002-3.03.077.077 0 0 0 .032-.054c.5-5.177-.838-9.674-3.549-13.66a.061.061 0 0 0-.031-.03zM8.02 15.33c-1.183 0-2.157-1.085-2.157-2.419 0-1.333.956-2.419 2.157-2.419 1.21 0 2.176 1.096 2.157 2.42 0 1.333-.956 2.419-2.157 2.419zm7.975 0c-1.183 0-2.157-1.085-2.157-2.419 0-1.333.955-2.419 2.157-2.419 1.21 0 2.176 1.096 2.157 2.42 0 1.333-.946 2.419-2.157 2.419z"/></svg>
                Sign up with Discord
            </button>

            <button onclick="handleLogin('azure')" class="w-full py-4 bg-[#00A4EF] hover:bg-[#0091D5] text-white rounded-xl font-black uppercase italic tracking-widest text-xs transition-all flex items-center justify-center gap-3 shadow-lg shadow-[#00A4EF]/20 active:scale-95">
                <svg class="w-5 h-5" viewBox="0 0 23 23"><path fill="currentColor" d="M11.4 24H0V12.6h11.4V24zM24 24H12.6V12.6H24V24zM11.4 11.4H0V0h11.4v11.4zM24 11.4H12.6V0H24v11.4z" transform="scale(0.9583)"/></svg>
                Sign up with Microsoft
            </button>

            <p class="text-center text-white/30 text-[10px] font-medium italic">
                By creating an account, you join the Nebula network.
            </p>
        </div>

        <div class="mt-8 text-center px-4">
            <p class="text-white/20 text-[10px] font-bold uppercase tracking-widest italic mb-4">Already have an account?</p>
            <a href="./sign-in.html" class="text-nebula-400 hover:text-white transition-colors text-[10px] font-black uppercase tracking-widest italic border-b border-nebula-500/20 pb-1">Enter Nebula Station →</a>
        </div>
    </div>

    <script>
        // Use the sign-in logic
        const SUPABASE_URL = 'https://ootqstqrkhiyccciygmn.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_CY6ssrG0hkQF5k-5Oz2MHQ_YW9N--TL';
        const supabaseLib = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        function handleLogin(provider) {
            const urlParams = new URLSearchParams(window.location.search);
            const port = urlParams.get('port');
            
            const redirectUrl = window.location.origin + window.location.pathname.replace('/auth/sign-up.html', '/auth-callback.html') + (port ? '?port=' + port : '');
            
            supabaseLib.auth.signInWithOAuth({
                provider: provider,
                options: {
                    redirectTo: redirectUrl,
                    scopes: provider === 'discord' ? 'identify guilds guilds.members.read email' : 'openid profile email'
                }
            });
        }
    </script>
</body>
</html>
