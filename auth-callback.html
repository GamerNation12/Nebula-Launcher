<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nebula Launcher | Authenticating...</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @keyframes orbit {
            from { transform: rotate(0deg) translateX(40px) rotate(0deg); }
            to { transform: rotate(360deg) translateX(40px) rotate(-360deg); }
        }
        .nebula-glow {
            background: radial-gradient(circle, #8b5cf6 0%, #7c3aed 70%, #0a0a0a 100%);
            box-shadow: 0 0 60px rgba(139, 92, 246, 0.4);
        }
    </style>
</head>
<body class="bg-[#0a0a0a] text-white h-screen flex flex-col items-center justify-center font-sans overflow-hidden">
    <div class="relative">
        <div class="w-24 h-24 rounded-full nebula-glow relative z-10 flex items-center justify-center animate-pulse">
            <img src="../assets/logo.png" alt="Nebula" class="w-12 h-12">
        </div>
        <div class="absolute inset-[-20px] border-2 border-dashed border-white/10 rounded-full animate-[spin_10s_linear_infinite]"></div>
        <div class="absolute top-1/2 left-1/2 w-3 h-3 bg-white rounded-full animate-[orbit_3s_linear_infinite] shadow-[0_0_10px_white]"></div>
    </div>

    <div class="mt-12 text-center space-y-4 px-6 max-w-md">
        <h1 id="status-title" class="text-2xl font-black italic uppercase tracking-tighter">Synchronizing...</h1>
        <p id="status-desc" class="text-white/60 text-sm font-medium leading-relaxed italic">Linking your Interstellar identity with the Nebula Launcher core.</p>
        <div id="error-box" class="hidden p-4 bg-red-500/10 border border-red-500/20 rounded-xl text-red-400 text-xs"></div>
    </div>

    <script>
        const statusTitle = document.getElementById('status-title');
        const statusDesc = document.getElementById('status-desc');
        const errorBox = document.getElementById('error-box');

        function showError(msg) {
            statusTitle.innerText = "Connection Failed";
            statusTitle.classList.add('text-red-400');
            statusDesc.innerText = "We couldn't reach your launcher. Please ensure the app is open.";
            errorBox.innerText = msg;
            errorBox.classList.remove('hidden');
        }

        async function processCallback() {
            // 1. Parse tokens from URL fragment (Supabase uses # for hash params)
            const hashParams = new URLSearchParams(window.location.hash.substring(1));
            const searchQuery = new URLSearchParams(window.location.search);
            
            const accessToken = hashParams.get('access_token');
            const refreshToken = hashParams.get('refresh_token');
            const providerToken = hashParams.get('provider_token');
            const port = searchQuery.get('port');

            if (!accessToken || !port) {
                showError("No authentication tokens or port found in the request.");
                return;
            }

            try {
                statusTitle.innerText = "Bridge Established";
                
                // 2. Send tokens to the local launcher server
                const callbackUrl = `http://localhost:${port}/callback?access_token=${accessToken}&refresh_token=${refreshToken || ''}${providerToken ? '&provider_token=' + providerToken : ''}`;
                
                const response = await fetch(callbackUrl, {
                    method: 'GET',
                    mode: 'no-cors' // We use no-cors because the local server might not have proper CORS set up
                });

                // 3. Update UI on success
                statusTitle.innerText = "Return to Launcher";
                statusTitle.classList.add('text-green-400');
                statusDesc.innerText = "Authentication successful. You can close this tab now.";
                
                // Auto-close tab (if browser allows) or show success checkmark
                setTimeout(() => {
                    window.close();
                }, 3000);

            } catch (err) {
                console.error('Bridge error:', err);
                showError("The bridge to localhost failed. " + err.message);
            }
        }

        window.onload = processCallback;
    </script>
</body>
</html>
